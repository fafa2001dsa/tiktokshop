    <!-- Hot-path: rota /p/pan é a principal do TikTok Ads.
         Script inline detecta URL e injeta preload do hero image ANTES do JS carregar.
         Ganha ~500-800ms no LCP em rede 4G. -->
    <script>
      (function(){
        try {
          var path = location.pathname;
          // Ativado pra qualquer variante do PAN (/p/pan, /pan, /p/panpromo, jogo-panelas-ditalia)
          if (/^\/(p\/pan|p\/panpromo|pan|panpromo|jogo-panelas-ditalia)(\/|$)/.test(path)) {
            var cacheKey = "pan:hero:v1";
            var cached = null;
            try { cached = localStorage.getItem(cacheKey); } catch(_) {}
            if (cached) {
              var link = document.createElement("link");
              link.rel = "preload";
              link.as = "image";
              link.href = cached;
              link.setAttribute("fetchpriority", "high");
              document.head.appendChild(link);
            }
          }
        } catch(e){}
      })();
    </script>
